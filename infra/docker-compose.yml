version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: adaptive-rag-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: adaptive_rag
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: adaptive-rag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n:latest
    container_name: adaptive-rag-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - API_BASE_URL=${API_BASE_URL:-http://host.docker.internal:8000}
      - EVAL_THRESHOLD=${EVAL_THRESHOLD:-0.5}
      - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL:-}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows/n8n:/workflows
    depends_on:
      - mongodb
    profiles:
      - n8n

volumes:
  mongo_data:
  qdrant_data:
  n8n_data:
